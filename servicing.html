<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hello, world!</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="" />
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <div class="radial-gradient"></div>
    <form class="form">
      <h1 class="h1">Create your account</h1>
      <p class="p">Let's get you signed up and ready to explore!</p>
      <div class="did-floating-label-content">
        <input class="did-floating-input" type="text" placeholder=" " />
        <label class="did-floating-label">Enter username</label>
      </div>
      <div class="did-floating-label-content">
        <input class="did-floating-input" type="text" placeholder=" " />
        <label class="did-floating-label">Enter password</label>
      </div>
      <div class="flex-row">
        <span class="span">Forgot password?</span>
      </div>
      <button class="button-submit">Continue</button>
      <div class="already-have">
        <p class="p-already">
          Already have an account?
          <span class="span">Sign in</span>
        </p>
      </div>
    </form>

    <script src="scroll.js"></script>
    <script src="http://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="http://threejs.org/examples/js/libs/stats.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script>
      $(document).mousemove(function (event) {
        var windowWidth = $(window).width();
        var windowHeight = $(window).height();
        var scrollX = $(window).scrollLeft();
        var scrollY = $(window).scrollTop();
        var mouseXpercentage = Math.round(((event.pageX - scrollX) / windowWidth) * 100);
        var mouseYpercentage = Math.round(((event.pageY - scrollY) / windowHeight) * 100);
        $(".radial-gradient").css("background", "radial-gradient(circle at " + mouseXpercentage + "% " + mouseYpercentage + "%, #14142b 10%, #0a0a15 70%)");
      });
    </script>
  </body>
</html>
